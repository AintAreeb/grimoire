name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          [ -f manifest.json ] && cp manifest.json www/ || true
          [ -f sw.js ] && cp sw.js www/ || true
          [ -f icon.png ] && cp icon.png www/ || true
      - run: npm install
      - run: npm install @capacitor/status-bar@6
      - run: npx cap add android
      - name: Patch native theme for transparent status bar (Realme UI / ColorOS etc.)
        run: |
          STYLES=android/app/src/main/res/values/styles.xml
          sed -i 's#<style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">#<style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">\n        <item name="android:windowDrawsSystemBarBackgrounds">true</item>\n        <item name="android:statusBarColor">@android:color/transparent</item>\n        <item name="android:windowLightStatusBar">false</item>\n        <item name="android:navigationBarColor">@android:color/transparent</item>#' "$STYLES"
          cat "$STYLES"

          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's#android:name=".MainActivity"#android:name=".MainActivity"\n            android:windowLayoutInDisplayCutoutMode="shortEdges"#' "$MANIFEST"
          sed -i 's#<application#<uses-permission android:name="android.permission.RECORD_AUDIO" />\n\n    <application#' "$MANIFEST"
          cat "$MANIFEST"
      - name: Grant WebView permission requests (mic access)
        run: |
          MAINACT=android/app/src/main/java/com/grimoire/cardgame/MainActivity.java
          cat > "$MAINACT" << 'EOF'
          package com.grimoire.cardgame;

          import android.os.Bundle;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getBridge().getWebView().setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(final PermissionRequest request) {
                          runOnUiThread(() -> request.grant(request.getResources()));
                      }
                  });
              }
          }
          EOF
          cat "$MAINACT"
      - name: Build adaptive icon layers (foreground, background, monochrome)
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick wget
          mkdir -p resources
          wget -q -O /tmp/grimoire-font.ttf \
            "https://github.com/google/fonts/raw/main/ofl/unifrakturcook/UnifrakturCook-Bold.ttf"

          # Solid background layer
          convert -size 1024x1024 xc:"#000000" \
            resources/icon-background.png

          # Foreground: cream-colored text on transparent background
          convert -size 1024x1024 xc:none \
            -gravity center -fill "#e8ddc6" \
            -font /tmp/grimoire-font.ttf -pointsize 220 \
            -annotate +0+0 "grimoire" \
            resources/icon-foreground.png

          # Combined icon: text over black
          convert -size 1024x1024 xc:"#000000" \
            \( -size 1024x1024 xc:none -gravity center -fill "#e8ddc6" \
               -font /tmp/grimoire-font.ttf -pointsize 220 \
               -annotate +0+0 "grimoire" \) \
            -gravity center -composite \
            resources/icon.png

          # Monochrome: white silhouette for themed icons
          convert -size 1024x1024 xc:none \
            -gravity center -fill white \
            -font /tmp/grimoire-font.ttf -pointsize 220 \
            -annotate +0+0 "grimoire" \
            resources/icon-monochrome.png

          # Splash: larger text, same treatment
          convert -size 2732x2732 xc:"#000000" \
            \( -size 2732x2732 xc:none -gravity center -fill "#e8ddc6" \
               -font /tmp/grimoire-font.ttf -pointsize 460 \
               -annotate +0+0 "grimoire" \) \
            -gravity center -composite \
            resources/splash.png
      - name: Generate icon and splash screen
        run: |
          npx @capacitor/assets generate --android \
            --splashBackgroundColor '#000000' \
            --splashBackgroundColorDark '#000000'
      - run: npx cap sync android
      - run: chmod +x android/gradlew
      - working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk grimoire.apk
          echo "APK_NAME=grimoire.apk" >> $GITHUB_ENV
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Build ${{ github.sha }}"
          body: "Commit: ${{ github.sha }}"
          files: ${{ env.APK_NAME }}

name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          [ -f manifest.json ] && cp manifest.json www/ || true
          [ -f sw.js ] && cp sw.js www/ || true
          [ -f icon.png ] && cp icon.png www/ || true
      - run: npm install
      - run: npx cap add android
      - name: Build safe-zone padded icon and splash source images
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          mkdir -p resources
          convert -size 1024x1024 xc:"#080710" \
            \( icon.png -resize 620x620 \) -gravity center -composite \
            resources/icon.png
          convert -size 2732x2732 xc:"#080710" \
            \( icon.png -resize 1200x1200 \) -gravity center -composite \
            resources/splash.png
      - name: Generate icon and splash screen
        run: |
          npx @capacitor/assets generate --android \
            --iconBackgroundColor '#080710' \
            --iconBackgroundColorDark '#080710' \
            --splashBackgroundColor '#080710' \
            --splashBackgroundColorDark '#080710'
      - run: npx cap sync android
      - run: chmod +x android/gradlew
      - working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: grimoire-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk            --splashBackgroundColor '#080710' \
            --splashBackgroundColorDark '#080710'
      - run: npx cap sync android
      - run: chmod +x android/gradlew
      - working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: grimoire-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
